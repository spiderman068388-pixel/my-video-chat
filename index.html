<style>
    /* Unique Scanning Animation */
    .scanner {
        position: absolute; top: 0; left: 0; width: 100%; height: 2px;
        background: #ff0055; box-shadow: 0 0 15px #ff0055;
        animation: scan 2s linear infinite; display: none;
    }
    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }
    .searching-text {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 12px; color: #ff0055; text-transform: uppercase; letter-spacing: 2px;
        display: none; text-align: center;
    }
</style>

<div class="video-box">
    <div class="scanner" id="scanLine"></div>
    <div class="searching-text" id="searchText">Searching Universe...</div>
    <video id="remoteVideo" autoplay playsinline></video>
</div>
