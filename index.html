<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const startBtn = document.getElementById('startBtn');
    const localBox = document.getElementById('localVideoBox');
    const remoteBox = document.getElementById('remoteVideoBox');
    let stream;
    let peerConnection;

    // WebRTC configuration
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    startBtn.onclick = async () => {
        try {
            if(!stream) {
                // 1. Camera access
                stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                localBox.innerHTML = '<div class="watermark">You</div><video id="v" autoplay muted playsinline></video>';
                document.getElementById('v').srcObject = stream;
            }
            
            startBtn.innerText = "Searching...";
            startBtn.style.background = "#f39c12";
            
            // 2. Server ko bolna ki partner dhoondho
            socket.emit('find-partner');
        } catch(e) { alert("Bhai camera allow karo!"); }
    };

    // Jab partner mil jaye
    socket.on('partner-found', async () => {
        startBtn.innerText = "Next";
        startBtn.style.background = "#58d68d";
        console.log("Stranger connected!");
        
        // Yahan se asli video exchange shuru hoga
        setupWebRTC();
    });

    function setupWebRTC() {
        peerConnection = new RTCPeerConnection(config);
        
        // Apni video track add karna
        stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

        // Jab stranger ki video aaye
        peerConnection.ontrack = (event) => {
            remoteBox.innerHTML = '<div class="watermark">Stranger</div><video id="remoteV" autoplay playsinline></video>';
            document.getElementById('remoteV').srcObject = event.streams[0];
        };
    }
</script>
