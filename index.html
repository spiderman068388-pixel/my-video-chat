<script>
    const socket = io();
    let localStream, pc, currentRoomId = null;

    // Ye servers video connect karne mein madad karenge
    const config = { 
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ] 
    };

    async function startMatching() {
        document.getElementById('status').innerText = "Accessing Camera...";
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            socket.emit('start-match');
        } catch (e) { alert("Camera allow karo bhai!"); }
    }

    socket.on('matched', async (roomId) => {
        currentRoomId = roomId;
        document.getElementById('status').innerText = "Stranger Located!";
        setupWebRTC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { offer, roomId: currentRoomId });
    });

    function setupWebRTC() {
        if (pc) pc.close();
        pc = new RTCPeerConnection(config);
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
        pc.onicecandidate = (e) => {
            if (e.candidate) socket.emit('signal', { candidate: e.candidate, roomId: currentRoomId });
        };
    }

    socket.on('signal', async (data) => {
        if (!pc) setupWebRTC();
        if (data.offer) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { answer, roomId: currentRoomId });
        } else if (data.answer) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        } else if (data.candidate) {
            try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {}
        }
    });
</script>
