<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmeTV Video Chat — Omegle</title>
    <link rel="stylesheet" href="style.css?v=99.0"
</head>
<body>
    <div class="main-wrapper">
        <div class="video-section">
            <div class="video-container stranger-box">
                <img src="https://ometv.chat/assets/img/ometv-logo.png" alt="OmeTV" class="placeholder-logo">
                <div class="volume-bar"></div>
            </div>
            <div class="video-container you-box">
                <div class="spinner"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="controls-left">
                <button id="startBtn" class="btn start-green">Start</button>
                <button id="stopBtn" class="btn stop-red">Stop</button>
                <div class="input-box">Country 🇵🇭</div>
                <div class="input-box">I am 👦</div>
            </div>
            <div class="chat-area">
                <div class="chat-hint">By pressing "Start", you agree to our <u>rules</u>. Rule violators will be banned.</div>
                <div class="chat-input-wrapper">
                    <input type="text" placeholder="Write a message" id="msgInput">
                    <span class="emoji-btn">😊</span>
                </div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
