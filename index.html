<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuristic OmeTV</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #e0e0e0; margin: 0; font-family: sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        /* Status Bar */
        #status { 
            padding: 15px; text-align: center; font-weight: bold; 
            background: rgba(0,0,0,0.5); letter-spacing: 1px; color: #00d1ff;
        }
        /* Video Section */
        .video-grid { 
            flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 15px;
        }
        .video-box { 
            flex: 1; position: relative; border-radius: 20px; overflow: hidden;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #remoteVideo { border: 2px solid #ff0055; box-shadow: 0 0 20px #ff0055; }
        #localVideo { border: 2px solid #00d1ff; box-shadow: 0 0 20px #00d1ff; transform: scaleX(-1); }

        /* Controls Area */
        .controls { 
            padding: 20px; display: flex; justify-content: center; gap: 15px;
            background: rgba(0, 0, 0, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn {
            border: none; border-radius: 50px; padding: 15px 30px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: 0.4s ease;
            color: white; font-size: 14px;
        }
        .start-btn { background: #00d1ff; color: #000; box-shadow: 0 0 15px #00d1ff; }
        .next-btn { background: #28a745; box-shadow: 0 0 15px #28a745; }
        
        @media (min-width: 768px) { .video-grid { flex-direction: row; } }
    </style>
</head>
<body>
    <div id="status">READY TO ENTER THE MATRIX</div>
    
    <div class="video-grid">
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="video-box">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn start-btn" onclick="startMatching()">START MATCH</button>
        <button class="btn next-btn" onclick="location.reload()">NEXT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream, pc, currentRoomId = null;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function startMatching() {
            document.getElementById('status').innerText = "SYNCING BIO-DATA...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                socket.emit('start-match');
            } catch (e) { alert("Camera Permission chahiye bhai!"); }
        }

        socket.on('matched', async (roomId) => {
            currentRoomId = roomId;
            document.getElementById('status').innerText = "SUBJECT LOCATED!";
            setupWebRTC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { offer, roomId: currentRoomId });
        });

        function setupWebRTC() {
            if (pc) pc.close();
            pc = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
            pc.onicecandidate = (event) => {
                if (event.candidate) socket.emit('signal', { candidate: event.candidate, roomId: currentRoomId });
            };
        }

        socket.on('signal', async (data) => {
            if (data.offer) {
                setupWebRTC();
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { answer, roomId: currentRoomId });
            } else if (data.answer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate) {
                try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {}
            }
        });
    </script>
</body>
</html>
