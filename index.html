<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmeTV Clone - Mobile Fix</title>
    <style>
        body { 
            background-color: #121212; color: white; margin: 0; padding: 0; 
            font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; 
        }
        .video-grid { 
            flex: 1; display: flex; flex-direction: column; background: #000;
        }
        .video-box { 
            flex: 1; position: relative; border: 1px solid #333; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { transform: scaleX(-1); }
        .label { 
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; font-size: 12px;
        }
        .status-bar {
            position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10;
        }
        .status-text {
            background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 14px;
        }
        .controls { 
            height: 80px; background: #1e1e1e; display: flex; 
            justify-content: space-around; align-items: center; padding: 0 10px;
        }
        .btn { 
            flex: 1; margin: 0 5px; height: 50px; border: none; 
            border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .start-btn { background: #0084ff; color: white; }
        .next-btn { background: #28a745; color: white; }
        
        @media (min-width: 768px) { .video-grid { flex-direction: row; } }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="status-text" id="status">Press START</span>
    </div>

    <div class="video-grid">
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">Stranger</div>
        </div>
        <div class="video-box">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">You (Me)</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn start-btn" onclick="startMatching()">START</button>
        <button class="btn next-btn" onclick="location.reload()">NEXT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream, pc, currentRoomId = null;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function startMatching() {
            document.getElementById('status').innerText = "Finding stranger...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                socket.emit('start-match');
            } catch (e) { alert("Camera allow karo bhai!"); }
        }

        socket.on('matched', async (roomId) => {
            currentRoomId = roomId;
            document.getElementById('status').innerText = "Connected!";
            setupWebRTC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { offer, roomId: currentRoomId });
        });

        function setupWebRTC() {
            if (pc) pc.close();
            pc = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
            pc.onicecandidate = (event) => {
                if (event.candidate) socket.emit('signal', { candidate: event.candidate, roomId: currentRoomId });
            };
        }

        socket.on('signal', async (data) => {
            if (data.offer) {
                setupWebRTC();
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { answer, roomId: currentRoomId });
            } else if (data.answer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate) {
                try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {}
            }
        });
    </script>
</body>
</html>
